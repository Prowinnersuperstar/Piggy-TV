<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pag Pag TV</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #ff0000;
    padding: 10px;
  }
  header img {
    height: 60px;
    margin-right: 10px;
  }
  header h1 {
    color: white;
    margin: 0;
    font-size: 1.5em;
  }
  /* Subscribe button styling - removed */
  /* #subscribeBtn styles removed */
  /* #subCount styles removed */
  main {
    padding: 20px;
    margin-top: 100px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
    text-align: center;
  }
  .welcome {
    font-size: 1.5em;
    margin-bottom: 20px;
  }
  /* Responsive iframe for videos */
  .video-container {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 aspect ratio */
    height: 0;
    overflow: hidden;
  }
  .video-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<header>
  <img src="https://plain-apac-prod-public.komododecks.com/202605/04/pNxPzHWuSkiTSfjvCfpz/image.png" alt="Pag Pag TV Logo" />
  <h1>Pag Pag TV</h1>
</header>

<!-- Subscribe button and subscriber count removed -->

<main>
  <div class="welcome">Welcome to Pag Pag TV!</div>
  <!-- Embedded video with responsive container -->
  <div class="video-container">
    <iframe src="https://streamable.com/e/erlwfl" frameborder="0" allowfullscreen></iframe>
  </div>
</main>

<script>
  // Removed all subscription-related scripts
  // No subscription logic needed now
</script>
</body>
</html>
